<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рунолог Ксения </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<header>
    <h1>Рунолог Ксения </h1>
    <p>Проведи руку через судьбу</p>
</header>

<section class="about">
    <h2>Обо мне</h2>
    <p>
        Я читаю руны и помогаю раскрыть тайны судьбы.  
        Каждая руна — это голос Вселенной.
    </p>
</section>

<section class="services">
    <h2>Расклады</h2>
    <div class="cards">
        <div class="card"> Ситуация</div>
        <div class="card"> Любовь</div>
        <div class="card"> Путь</div>
    </div>
</section>

<section class="rune">
    <h2>✨ Получить руну дня</h2>
    <button onclick="getRune()">Выбрать руну</button>
    <p id="runeResult"></p>
</section>

<section class="contact">
    <h2>Связь</h2>
    <button onclick="contactMe()">Написать мне</button>
</section>

<script src="script.js"></script>
</body>
</html>
